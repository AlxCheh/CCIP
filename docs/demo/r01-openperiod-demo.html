<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCIP — R-01: OpenPeriod Flow</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #7d8590;
  --blue: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #e3b341;
  --purple: #d2a8ff;
}

body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
header h1 { font-size: 14px; font-weight: 600; flex: 1; }
.tag {
  font-size: 11px; font-weight: 600;
  padding: 2px 9px; border-radius: 20px;
  font-family: 'Consolas', monospace;
}
.tag-blue  { background: #1f6feb; color: #fff; }
.tag-green { background: #238636; color: #fff; }
.tag-gray  { background: #30363d; color: var(--muted); }

/* ── LAYOUT ── */
.layout {
  flex: 1;
  display: grid;
  grid-template-columns: 235px 1fr 340px;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.sec-label {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted);
  margin-bottom: 8px;
}
.scenario-btn {
  width: 100%; text-align: left;
  background: #21262d; border: 1px solid var(--border);
  color: var(--text); padding: 9px 11px;
  border-radius: 6px; cursor: pointer;
  margin-bottom: 6px; font-size: 12px;
  transition: all 0.15s;
}
.scenario-btn:hover { background: #30363d; }
.scenario-btn.active {
  background: rgba(31,111,235,.15);
  border-color: #1f6feb; color: var(--blue);
}
.scenario-btn .s-name { font-weight: 600; display: block; }
.scenario-btn .s-desc { color: var(--muted); font-size: 11px; margin-top: 2px; }
.scenario-btn.active .s-desc { color: #79c0ff; }

.state-box {
  background: #21262d; border: 1px solid var(--border);
  border-radius: 6px; padding: 10px;
}
.state-row {
  display: flex; justify-content: space-between;
  align-items: center; font-size: 11px;
  font-family: 'Consolas', monospace; margin-bottom: 7px;
}
.state-row:last-child { margin-bottom: 0; }
.state-key { color: var(--muted); }
.state-val { font-weight: 600; }
.v-green  { color: var(--green); }
.v-red    { color: var(--red); }
.v-yellow { color: var(--yellow); }
.v-blue   { color: var(--blue); }

.controls { display: flex; flex-direction: column; gap: 8px; }
.run-btn {
  background: #238636; color: #fff; border: none;
  padding: 9px 12px; border-radius: 6px;
  cursor: pointer; font-size: 13px; font-weight: 600;
  transition: background .15s; width: 100%;
}
.run-btn:hover:not(:disabled) { background: #2ea043; }
.run-btn:disabled { background: #21262d; color: var(--muted); cursor: not-allowed; }
.speed-row {
  display: flex; justify-content: space-between;
  align-items: center; font-size: 11px; color: var(--muted);
}
input[type="range"] { width: 100%; accent-color: var(--blue); margin-top: 4px; }

.adr-note {
  font-size: 10px; color: var(--muted);
  border-top: 1px solid var(--border); padding-top: 10px;
  line-height: 1.6;
}
.adr-note a { color: var(--blue); text-decoration: none; }

/* ── CENTER ── */
.center { overflow-y: auto; padding: 16px; display: flex; justify-content: center; }

.stack {
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column; align-items: stretch;
}
.dual-stack {
  width: 100%;
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.dual-stack .stack { max-width: 100%; }

.layer {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 5px; padding: 8px 12px;
  transition: all 0.2s; position: relative;
  min-height: 38px; display: flex;
  flex-direction: column; justify-content: center;
}
.layer + .layer { margin-top: 3px; }
.layer.active  { background: rgba(31,111,235,.12); border-color: #1f6feb; box-shadow: 0 0 8px rgba(31,111,235,.25); }
.layer.success { background: rgba(35,134,54,.12);  border-color: #238636; }
.layer.error   { background: rgba(248,81,73,.12);  border-color: #f85149; }
.layer.waiting { background: rgba(158,106,3,.12);  border-color: #e3b341; }

.layer-title {
  font-size: 12px; font-weight: 600;
  font-family: 'Consolas', monospace; color: var(--text);
}
.layer.active  .layer-title { color: var(--blue); }
.layer.success .layer-title { color: var(--green); }
.layer.error   .layer-title { color: var(--red); }
.layer.waiting .layer-title { color: var(--yellow); }

.layer-sub {
  font-size: 10px; color: var(--muted);
  margin-top: 2px; font-family: 'Consolas', monospace;
  transition: color .2s;
}
.layer.active  .layer-sub { color: #79c0ff; }
.layer.success .layer-sub { color: #56d364; }
.layer.error   .layer-sub { color: #ff7b72; }
.layer.waiting .layer-sub { color: #e3b341; }

.connector {
  height: 14px; display: flex;
  align-items: center; justify-content: center;
  color: var(--muted); font-size: 10px;
}

.tx-wrapper {
  border: 1px dashed var(--border); border-radius: 8px;
  padding: 8px; transition: border-color .3s;
  margin: 1px 0;
}
.tx-wrapper.active  { border-color: rgba(31,111,235,.6); }
.tx-wrapper.success { border-color: rgba(35,134,54,.6); }
.tx-wrapper.error   { border-color: rgba(248,81,73,.6); }

.tx-head {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .5px; color: var(--muted);
  margin-bottom: 6px; padding-left: 2px;
}

/* ── CONSOLE ── */
.console-panel {
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.console-head {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 7px 14px; display: flex;
  justify-content: space-between; align-items: center; flex-shrink: 0;
}
.console-head span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.clear-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; }
.clear-btn:hover { color: var(--text); }
#console-body {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 11px; line-height: 1.7;
}
.log-line {
  display: flex; gap: 8px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-3px); }
  to   { opacity: 1; transform: translateX(0); }
}
.log-ts   { color: var(--muted); flex-shrink: 0; }
.log-text { flex: 1; word-break: break-all; }
.t-info    { color: var(--blue); }
.t-success { color: var(--green); }
.t-error   { color: var(--red); }
.t-warn    { color: var(--yellow); }
.t-code    { color: var(--purple); }
.t-dim     { color: var(--muted); }

/* ── RESULT BADGE ── */
#result-badge {
  display: none; position: fixed;
  bottom: 22px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  font-family: 'Consolas', monospace;
  animation: popIn .3s ease; z-index: 100;
  white-space: nowrap;
}
@keyframes popIn {
  from { opacity: 0; transform: translateX(-50%) scale(.88); }
  to   { opacity: 1; transform: translateX(-50%) scale(1); }
}
.r-201  { background: #238636; color: #fff; border: 1px solid #2ea043; }
.r-403  { background: #da3633; color: #fff; border: 1px solid #f85149; }
.r-409  { background: #7d4e00; color: #e3b341; border: 1px solid #e3b341; }
.r-info { background: var(--surface); color: var(--blue); border: 1px solid #1f6feb; }
</style>
</head>
<body>

<header>
  <span class="tag tag-blue">CCIP</span>
  <h1>R-01 Demo — NestJS · OpenPeriod Flow</h1>
  <span class="tag tag-green">NestJS</span>
  <span class="tag tag-gray">Prisma</span>
  <span class="tag tag-gray">BullMQ</span>
</header>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">
    <div>
      <div class="sec-label">Сценарий</div>
      <button class="scenario-btn active" onclick="selectScenario('happy')">
        <span class="s-name">✅ Happy Path</span>
        <span class="s-desc">SC успешно открывает период</span>
      </button>
      <button class="scenario-btn" onclick="selectScenario('forbidden')">
        <span class="s-name">🚫 403 Forbidden</span>
        <span class="s-desc">0-отчёт не утверждён</span>
      </button>
      <button class="scenario-btn" onclick="selectScenario('conflict')">
        <span class="s-name">⚠️ 409 Conflict</span>
        <span class="s-desc">Период уже открыт</span>
      </button>
      <button class="scenario-btn" onclick="selectScenario('concurrent')">
        <span class="s-name">🔄 Concurrent</span>
        <span class="s-desc">Два SC одновременно → R-02</span>
      </button>
    </div>

    <div>
      <div class="sec-label">Состояние БД</div>
      <div class="state-box" id="state-box"></div>
    </div>

    <div class="controls">
      <button class="run-btn" id="run-btn" onclick="runScenario()">▶ Запустить</button>
      <div>
        <div class="speed-row">
          <span>Скорость</span>
          <span id="speed-label">средняя</span>
        </div>
        <input type="range" id="speed" min="1" max="5" value="3" oninput="updateSpeed(this.value)">
      </div>
    </div>

    <div class="adr-note">
      ADR-001 · ADR-002<br>
      CCIP/docs/decisions/
    </div>
  </div>

  <!-- ── CENTER ── -->
  <div class="center" id="center"></div>

  <!-- ── CONSOLE ── -->
  <div class="console-panel">
    <div class="console-head">
      <span>Console Log</span>
      <button class="clear-btn" onclick="clearConsole()">clear</button>
    </div>
    <div id="console-body"></div>
  </div>

</div>

<div id="result-badge"></div>

<script>
// ─── SCENARIOS ────────────────────────────────────────────────────────────────

const SCENARIOS = {

  happy: {
    state: {
      zero_report: { val: 'approved', cls: 'v-green' },
      open_period:  { val: 'none',     cls: 'v-green' },
      actor_role:   { val: 'stroycontrol', cls: 'v-blue' },
    },
    steps: [
      { id: 'client', st: 'active',   log: { t:'info',    m:'POST /api/objects/obj-123/periods/open' },
        sub: 'Authorization: Bearer eyJhbGci...Petrov' },
      { id: 'jwt',    st: 'active',   log: { t:'info',    m:'JwtAuthGuard → decode & verify token' } },
      { id: 'jwt',    st: 'success',  log: { t:'success', m:'✓ userId: user-petrov  role: stroycontrol' },
        sub: 'signature ✓  exp ✓' },
      { id: 'roles',  st: 'active',   log: { t:'info',    m:'RolesGuard → @Roles(stroycontrol, admin)' } },
      { id: 'roles',  st: 'success',  log: { t:'success', m:'✓ stroycontrol ∈ [stroycontrol, admin]' } },
      { id: 'ctrl',   st: 'success',  log: { t:'info',    m:'PeriodController.open(objectId="obj-123")' } },
      { id: 'svc',    st: 'active',   log: { t:'info',    m:'PeriodService.openPeriod()' } },
      { id: 'tx',     st: 'active',   log: { t:'code',    m:'BEGIN TRANSACTION' }, tx: 'active' },
      { id: 'lock',   st: 'active',   log: { t:'code',    m:"SET LOCAL lock_timeout = '5s'" } },
      { id: 'lock',   st: 'active',   log: { t:'code',    m:'SELECT pg_advisory_xact_lock(hashtext("obj-123")::bigint)' } },
      { id: 'lock',   st: 'success',  log: { t:'success', m:'✓ Lock acquired  key=-1823746211' },
        sub: 'hashtext("obj-123")::bigint' },
      { id: 'czero',  st: 'active',   log: { t:'code',    m:"SELECT * FROM zero_reports WHERE object_id=$1 AND status='approved'" } },
      { id: 'czero',  st: 'success',  log: { t:'success', m:'✓ Found: id=zr-001' } },
      { id: 'copen',  st: 'active',   log: { t:'code',    m:"SELECT * FROM periods WHERE object_id=$1 AND status='open'" } },
      { id: 'copen',  st: 'success',  log: { t:'success', m:'✓ null — no open period' } },
      { id: 'ins',    st: 'active',   log: { t:'code',    m:'SELECT MAX(period_number) FROM periods → 5' } },
      { id: 'ins',    st: 'active',   log: { t:'code',    m:"INSERT INTO periods {period_number:6, status:'open', gp_token:uuid-...}" } },
      { id: 'ins',    st: 'success',  log: { t:'success', m:'✓ Period #6 created  id=p-006' },
        sub: 'gp_token: f4a3b2c1-...' },
      { id: 'aud',    st: 'active',   log: { t:'code',    m:"INSERT INTO audit_log {action:'open_period', record_id:'p-006'}" } },
      { id: 'aud',    st: 'success',  log: { t:'success', m:'✓ Audit logged' } },
      { id: 'commit', st: 'success',  log: { t:'code',    m:'COMMIT  ← pg_advisory_lock released automatically' }, tx: 'success' },
      { id: 'svc',    st: 'success',  log: { t:'dim',     m:'← transaction committed' } },
      { id: 'bullmq', st: 'active',   log: { t:'info',    m:'periodQueue.add("send-gp-template", {periodId, token})' } },
      { id: 'bullmq', st: 'success',  log: { t:'success', m:'✓ Job queued  jobId=period-send-obj123-p6' },
        sub: 'async · SC response NOT blocked' },
      { id: 'resp',   st: 'success',  log: { t:'success', m:'HTTP 201 → {"periodNumber":6,"status":"open"}' },
        result: { cls:'r-201', txt:'201 Created  ·  Period #6 opened ✓' } },
    ]
  },

  forbidden: {
    state: {
      zero_report: { val: 'null',     cls: 'v-red' },
      open_period:  { val: 'none',     cls: 'v-green' },
      actor_role:   { val: 'stroycontrol', cls: 'v-blue' },
    },
    steps: [
      { id: 'client', st: 'active',   log: { t:'info',    m:'POST /api/objects/obj-123/periods/open' },
        sub: 'Authorization: Bearer eyJhbGci...Petrov' },
      { id: 'jwt',    st: 'success',  log: { t:'success', m:'✓ role: stroycontrol' } },
      { id: 'roles',  st: 'success',  log: { t:'success', m:'✓ stroycontrol ∈ allowed' } },
      { id: 'ctrl',   st: 'success',  log: { t:'info',    m:'PeriodController.open()' } },
      { id: 'svc',    st: 'active',   log: { t:'info',    m:'PeriodService.openPeriod()' } },
      { id: 'tx',     st: 'active',   log: { t:'code',    m:'BEGIN TRANSACTION' }, tx: 'active' },
      { id: 'lock',   st: 'success',  log: { t:'success', m:'✓ Lock acquired' } },
      { id: 'czero',  st: 'active',   log: { t:'code',    m:"SELECT * FROM zero_reports WHERE status='approved'" } },
      { id: 'czero',  st: 'error',    log: { t:'error',   m:'✗ Not found — zero_report not approved' },
        sub: 'result: null' },
      { id: 'tx',     st: 'error',    log: { t:'code',    m:'ROLLBACK  ← lock released' }, tx: 'error' },
      { id: 'svc',    st: 'error',    log: { t:'error',   m:"throw new ForbiddenException('ZERO_REPORT_NOT_APPROVED')" } },
      { id: 'resp',   st: 'error',    log: { t:'error',   m:'HTTP 403 → {"error":"ZERO_REPORT_NOT_APPROVED"}' },
        result: { cls:'r-403', txt:'403 Forbidden  ·  Zero report not approved' } },
    ]
  },

  conflict: {
    state: {
      zero_report: { val: 'approved', cls: 'v-green' },
      open_period:  { val: '#5 open',  cls: 'v-yellow' },
      actor_role:   { val: 'stroycontrol', cls: 'v-blue' },
    },
    steps: [
      { id: 'client', st: 'active',   log: { t:'info',    m:'POST /api/objects/obj-123/periods/open' },
        sub: 'Authorization: Bearer eyJhbGci...Sidorov' },
      { id: 'jwt',    st: 'success',  log: { t:'success', m:'✓ role: stroycontrol' } },
      { id: 'roles',  st: 'success',  log: { t:'success', m:'✓ stroycontrol ∈ allowed' } },
      { id: 'ctrl',   st: 'success',  log: { t:'info',    m:'PeriodController.open()' } },
      { id: 'svc',    st: 'active',   log: { t:'info',    m:'PeriodService.openPeriod()' } },
      { id: 'tx',     st: 'active',   log: { t:'code',    m:'BEGIN TRANSACTION' }, tx: 'active' },
      { id: 'lock',   st: 'success',  log: { t:'success', m:'✓ Lock acquired' } },
      { id: 'czero',  st: 'success',  log: { t:'success', m:'✓ zero_report approved' } },
      { id: 'copen',  st: 'active',   log: { t:'code',    m:"SELECT * FROM periods WHERE object_id=$1 AND status='open'" } },
      { id: 'copen',  st: 'error',    log: { t:'error',   m:'✗ Found: period #5 already open!' },
        sub: 'id=p-005  opened_by=Петров' },
      { id: 'tx',     st: 'error',    log: { t:'code',    m:'ROLLBACK  ← lock released' }, tx: 'error' },
      { id: 'svc',    st: 'error',    log: { t:'error',   m:"throw new ConflictException('PERIOD_ALREADY_OPEN')" } },
      { id: 'resp',   st: 'error',    log: { t:'error',   m:'HTTP 409 → {"error":"PERIOD_ALREADY_OPEN"}' },
        result: { cls:'r-409', txt:'409 Conflict  ·  Period #5 already open' } },
    ]
  },

  concurrent: {
    state: {
      zero_report: { val: 'approved',    cls: 'v-green' },
      open_period:  { val: 'none',        cls: 'v-green' },
      actor_role:   { val: '2× SC',       cls: 'v-yellow' },
    },
    // Each step: {a: stepForSC-A, b: stepForSC-B}  null = no change for that actor
    steps: [
      { a: { id:'client', st:'active',  log:{t:'info',    m:'[SC-A Петров] POST /periods/open'} },
        b: { id:'client', st:'active',  log:{t:'warn',    m:'[SC-B Иванов] POST /periods/open  (одновременно)'} } },
      { a: { id:'jwt',    st:'success', log:{t:'success', m:'[SC-A] ✓ role: stroycontrol'} },
        b: { id:'jwt',    st:'success', log:{t:'success', m:'[SC-B] ✓ role: stroycontrol'} } },
      { a: { id:'svc',    st:'active',  log:{t:'info',    m:'[SC-A] BEGIN TRANSACTION'}, tx:'active' },
        b: { id:'svc',    st:'active',  log:{t:'info',    m:'[SC-B] BEGIN TRANSACTION'}, tx:'active' } },
      { a: { id:'lock',   st:'success', log:{t:'success', m:'[SC-A] ✓ pg_advisory_lock acquired on obj-123'} },
        b: { id:'lock',   st:'waiting', log:{t:'warn',    m:'[SC-B] ⏳ waiting for lock on obj-123...'},
             sub:'blocked — SC-A holds the lock' } },
      { a: { id:'czero',  st:'success', log:{t:'success', m:'[SC-A] ✓ zero_report approved'} },
        b: null },
      { a: { id:'copen',  st:'success', log:{t:'success', m:'[SC-A] ✓ no open period'} },
        b: null },
      { a: { id:'ins',    st:'success', log:{t:'success', m:'[SC-A] ✓ INSERT periods → period_number: 6'} },
        b: null },
      { a: { id:'commit', st:'success', log:{t:'code',    m:'[SC-A] COMMIT  ← lock released'}, tx:'success' },
        b: { id:'lock',   st:'success', log:{t:'success', m:'[SC-B] ✓ lock acquired (SC-A released it)'},
             sub:'now holds lock on obj-123' } },
      { a: { id:'resp',   st:'success', log:{t:'success', m:'[SC-A] HTTP 201  Period #6 created ✓'} },
        b: { id:'copen',  st:'error',   log:{t:'error',   m:'[SC-B] ✗ period #6 already open! (created by SC-A)'} } },
      { a: null,
        b: { id:'tx',     st:'error',   log:{t:'code',    m:'[SC-B] ROLLBACK  ← lock released'}, tx:'error' } },
      { a: null,
        b: { id:'resp',   st:'error',   log:{t:'error',   m:'[SC-B] HTTP 409  PERIOD_ALREADY_OPEN'},
             result:{cls:'r-info', txt:'SC-A → 201 Created (Period #6)   ·   SC-B → 409 Conflict'} } },
    ]
  }
};

// ─── STACK BUILDER ────────────────────────────────────────────────────────────

function buildStack(prefix) {
  const p  = prefix ? prefix + '-' : '';
  const who = prefix === 'b' ? '👤 SC Иванов' : '👤 SC Петров';
  const whoSub = prefix === 'b' ? 'stroycontrol · Иванов' : 'stroycontrol · Петров';
  return `
<div class="stack">
  <div class="layer" id="${p}client">
    <div class="layer-title">${who}</div>
    <div class="layer-sub">${whoSub}</div>
  </div>
  <div class="connector">↓ HTTP POST</div>
  <div class="layer" id="${p}jwt">
    <div class="layer-title">🛡 JwtAuthGuard</div>
    <div class="layer-sub">decode · verify · extract role</div>
  </div>
  <div class="layer" id="${p}roles" style="margin-top:3px">
    <div class="layer-title">🛡 RolesGuard</div>
    <div class="layer-sub">@Roles(stroycontrol, admin)</div>
  </div>
  <div class="connector">↓</div>
  <div class="layer" id="${p}ctrl">
    <div class="layer-title">📡 PeriodController</div>
    <div class="layer-sub">.open(objectId)</div>
  </div>
  <div class="connector">↓</div>
  <div class="layer" id="${p}svc">
    <div class="layer-title">⚙️ PeriodService</div>
    <div class="layer-sub">.openPeriod()</div>
  </div>
  <div class="connector">↓</div>
  <div class="tx-wrapper" id="${p}tx">
    <div class="tx-head">📦 Prisma Transaction</div>
    <div class="layer" id="${p}lock">
      <div class="layer-title">🔒 pg_advisory_lock</div>
      <div class="layer-sub" id="${p}lock-sub">hashtext(objectId)::bigint</div>
    </div>
    <div class="layer" id="${p}czero" style="margin-top:3px">
      <div class="layer-title">? zero_report check</div>
      <div class="layer-sub">WHERE status = 'approved'</div>
    </div>
    <div class="layer" id="${p}copen" style="margin-top:3px">
      <div class="layer-title">? open period check</div>
      <div class="layer-sub">WHERE status = 'open'</div>
    </div>
    <div class="layer" id="${p}ins" style="margin-top:3px">
      <div class="layer-title">📝 INSERT periods</div>
      <div class="layer-sub" id="${p}ins-sub">period_number = MAX + 1</div>
    </div>
    <div class="layer" id="${p}aud" style="margin-top:3px">
      <div class="layer-title">📋 INSERT audit_log</div>
      <div class="layer-sub">action = 'open_period'</div>
    </div>
    <div class="layer" id="${p}commit" style="margin-top:3px">
      <div class="layer-title">✔ COMMIT</div>
      <div class="layer-sub">lock auto-released</div>
    </div>
  </div>
  <div class="connector">↓</div>
  <div class="layer" id="${p}bullmq">
    <div class="layer-title">📬 BullMQ Queue</div>
    <div class="layer-sub">send-gp-template (async)</div>
  </div>
  <div class="connector">↓ HTTP</div>
  <div class="layer" id="${p}resp">
    <div class="layer-title">Response</div>
    <div class="layer-sub">—</div>
  </div>
</div>`;
}

function renderCenter() {
  const el = document.getElementById('center');
  if (currentScenario === 'concurrent') {
    el.innerHTML = `
      <div style="width:100%;max-width:700px">
        <div style="text-align:center;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">
          Два параллельных запроса · один объект obj-123
        </div>
        <div class="dual-stack">
          ${buildStack('a')}
          ${buildStack('b')}
        </div>
      </div>`;
  } else {
    el.innerHTML = buildStack('');
  }
}

// ─── LAYER STATE ─────────────────────────────────────────────────────────────

function setLayer(id, state, sub) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('active','success','error','waiting');
  if (state) el.classList.add(state);
  if (sub !== undefined) {
    const s = el.querySelector('.layer-sub');
    if (s) s.textContent = sub;
  }
}

function setTx(id, state) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('active','success','error');
  if (state) el.classList.add(state);
}

function resetAll() {
  ['','a-','b-'].forEach(p => {
    ['client','jwt','roles','ctrl','svc','lock','czero','copen','ins','aud','commit','bullmq','resp']
      .forEach(id => setLayer(p + id, null));
    setTx(p + 'tx', null);
  });
}

// ─── CONSOLE ─────────────────────────────────────────────────────────────────

let logStart = 0;

function addLog(entry) {
  if (!entry) return;
  const body = document.getElementById('console-body');
  const ms   = Date.now() - logStart;
  const ts   = ('+' + ms + 'ms').padStart(7);
  const div  = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `<span class="log-ts">${ts}</span><span class="log-text t-${entry.t}">${esc(entry.m)}</span>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function clearConsole() {
  document.getElementById('console-body').innerHTML = '';
  logStart = Date.now();
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── RESULT BADGE ────────────────────────────────────────────────────────────

function showResult(cfg) {
  const el = document.getElementById('result-badge');
  el.className = cfg.cls;
  el.textContent = cfg.txt;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ─── SCENARIO SELECT ─────────────────────────────────────────────────────────

let currentScenario = 'happy';
let running = false;
let stepDelay = 700;

const SPEED_LABELS = ['','медленно','медленно','средняя','быстро','очень быстро'];
const SPEED_DELAYS = [0, 1300, 950, 700, 420, 200];

function selectScenario(id) {
  if (running) return;
  currentScenario = id;
  document.querySelectorAll('.scenario-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['happy','forbidden','conflict','concurrent'][i] === id);
  });
  renderCenter();
  renderState();
  clearConsole();
  document.getElementById('result-badge').style.display = 'none';
}

function renderState() {
  const sc  = SCENARIOS[currentScenario];
  const box = document.getElementById('state-box');
  box.innerHTML = Object.entries(sc.state).map(([k, v]) =>
    `<div class="state-row">
      <span class="state-key">${k}</span>
      <span class="state-val ${v.cls}">${v.val}</span>
    </div>`
  ).join('');
}

function updateSpeed(v) {
  stepDelay = SPEED_DELAYS[+v];
  document.getElementById('speed-label').textContent = SPEED_LABELS[+v];
}

// ─── RUN ─────────────────────────────────────────────────────────────────────

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function runScenario() {
  if (running) return;
  running = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('result-badge').style.display = 'none';
  clearConsole();
  logStart = Date.now();
  renderCenter();
  resetAll();

  if (currentScenario === 'concurrent') {
    await runConcurrent();
  } else {
    await runLinear();
  }

  running = false;
  document.getElementById('run-btn').disabled = false;
}

async function runLinear() {
  const steps = SCENARIOS[currentScenario].steps;
  for (const step of steps) {
    await sleep(stepDelay);
    setLayer(step.id, step.st, step.sub);
    if (step.tx) setTx('tx', step.tx);
    if (step.log) addLog(step.log);
    if (step.result) showResult(step.result);
  }
}

async function runConcurrent() {
  const steps = SCENARIOS[currentScenario].steps;
  for (const step of steps) {
    await sleep(stepDelay);
    if (step.a) {
      setLayer('a-' + step.a.id, step.a.st, step.a.sub);
      if (step.a.tx)  setTx('a-tx', step.a.tx);
      if (step.a.log) addLog(step.a.log);
    }
    if (step.b) {
      setLayer('b-' + step.b.id, step.b.st, step.b.sub);
      if (step.b.tx)  setTx('b-tx', step.b.tx);
      if (step.b.log) addLog(step.b.log);
      if (step.b.result) showResult(step.b.result);
    }
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

renderCenter();
renderState();
</script>
</body>
</html>
